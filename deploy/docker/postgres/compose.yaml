services:
  postgres:
    image: postgres:17
    container_name: xmachine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Xmachine123!
      POSTGRES_DB: xmachine_nema
    ports:
      - "5432:5432"
    volumes:
      - xmachine_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xmachine_nema"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  xmachine_postgres_data: